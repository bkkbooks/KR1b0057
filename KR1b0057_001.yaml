body:
  text: 尚書地理今釋大學士蔣廷錫撰聖訓虞書堯典嵎夷今朝鮮地按孔安國傳東表之地稱嵎夷正義曰青州在東界外之畔為表故云東表之地禹貢錐指援据後漢書以嵎夷為朝鮮地蓋朝鮮古屬青州與今山東登州府隔海相對正合孔𫝊東表之語薛季宣書古文訓謂嵎夷海嵎諸夷今登州于欽齊乘又指為寧海州皆非也南交今安南國林之奇尚書解云南交即交趾也史記五帝本紀日黃帝之地北至於幽陵南至於交趾則交趾之對幽都其來尚矣西朔方按史記五帝紀注徐廣曰西者今天水之西縣漢屬隴西郡非也西縣秦置在今陜西鞏昌府秦州界非以和仲宅西而名西之不可為西縣猶朔方之不可為朔方郡皆不當専指一處黃度尚書說云禹貢西被流沙自流沙以西皆夷界山川不紀於職方故稱西以見境域之不止此也朔則北限沙漠荒茫悠逺山川不可見故稱朔方以為大界或曰山海經北荒有幽都山樂史寰宇記幽州有幽都山皆為附㑹此記良是媯汭在今山西平陽府蒲州界按孔安國𫝊云舜所居媯水之汭經典釋文云汭水之內也皆不以汭為水名而水經注云歷山有舜井媯水出焉南曰媯水北曰汭水異源同歸渾流南入於河史記正義亦引地記云河東郡青山東山中有二泉南流者媯水北流者汭水今考山西平陽府蒲州南有媯汭二水皆南注大河與水經注地記二書合蓋汭本訓北訓內又為小水入大水之名或後人見媯水北有一小水入媯遂蒙堯典文而加名耳舜典岱宗魯頌作泰山周禮作岱山在今山東濟南府泰安州北五里南嶽周禮作衡山山海經作􅒖嶁山在今湖廣衡州府衡山縣西北三十里接衡陽縣及長沙府界西嶽禹貢作太華周禮作華山在今陜西西安府華隂縣南十里北嶽禹貢作恆山漢避文帝諱改常山在今山西大同府渾源州南二十里接直𨽻真定府界按恆山自班固漢志載於上曲陽今真定府曲陽縣酈道元水經注以下咸宗之然今曲陽縣治去山趾一百四十里不若渾源之近本朝釐正祀典祠恆山於渾源州當主渾源為是幽洲按說文洲通作州括地志云故龔城在檀州燕樂縣界今順天府密雲縣東北塞外地故老𫝊云舜流共工幽州居此城崇山在今湖廣永定衛西大庸所東三苗今湖廣武昌嶽州二府江西九江府地史記正義曰吳起云三苗之國左洞庭而右彭蠡今江州鄂州嶽州也三危在今陜西嘉峪關外廢沙州衛界括地志云山有三峯故曰三危俗亦名卑羽山在沙州敦煌縣東南三十里按蔡𫝊云三危西裔之地即禹貢所謂三危既宅者是矣若導川黑水所經之三危自在大河之南與此為二詳禹貢三危下羽山在今山東兖州府沂水東南一百里接郯城縣及江南淮安府海州贑榆縣界大禹謨歷山在今山西平陽府蒲州南三十里即禹貢雷首山也水經注云河東郡南有歷山謂之歷觀舜所耕處益稷塗山在今江南鳯陽府懷逺縣東南八里孔頴逹正義曰哀七年左傳禹㑹諸侯於塗山杜預云塗山在夀春縣東北塗山國蓋近彼山也夏書禹貢諸篇地名皆依經文編次禹貢山川有一名再見或三見者若依例編叙未免重復混淆今將九州疆域山原川澤羌夷各以類次焉九州冀州今山西之太原平陽汾州潞安大同五府澤遼沁三州直𨽻之順天永平保定廣平順德宣化六府及真定河間二府西北境大名府濬縣西境盛京之錦州府河南之懷慶衛輝彰德三府其北直抵塞外隂山下西起東受降城今蒙古名薩爾几村之北東訖於大遼水也兖州今山東之東昌府及兖州府曺州陽榖夀張鄆城三縣濟南青州二府西北境直𨽻之大名府及真定河間二府東南境河南之衛輝府胙城縣也青州今山東之登州萊州二府青州府益都臨淄樂昌安丘夀光臨朐六縣及諸城髙苑博興樂安四縣南境濟南府肥城長清歷城章丘鄒平長山新城淄川八縣及泰安州萊蕪縣北境兖州府東阿平陰二縣北境其東北跨海為盛京之奉天府訖於朝鮮國也按孔傳云東北據海實據有遼東之地孔氏之言是也蔡氏謂東北至海者非徐州今江南之徐州及鳯陽府懷逺五河虹靈壁四縣泗宿二州淮安府桃源清河安東宿遷睢寧贑榆六縣邳海二州山東之兖州府滋陽曲阜寧陽泗水金鄉魚臺嘉祥巨野汶上郯城鄒滕嶧費十四縣及平隂縣南境濟寧東平沂三州濟南府新泰縣及萊蕪縣泰安州南境青州府莒州蒙隂沂水日照三縣及諸城縣南境也揚州今江南之江寧揚州廬州安慶池州太平寧國徽州鎮江常州蘇州松江十二府滁和廣德三州鳯陽府鳯陽臨淮定逺霍丘盱眙天長六縣夀州淮安府山陽鹽城二縣河南之汝寧府光山固始二縣光州湖廣之黃州府羅田蘄水廣濟黃梅四縣蘄州廣東之潮州府及浙江江西福建皆是也荆州今湖廣之武昌漢陽安陸荆州嶽州長沙衡州常德辰州寶慶永州十一府郴靖二州施州衛及襄陽府南漳縣德安府安陸雲夢孝感應城應山五縣隨州南境黃州府黃岡麻城黃陂黃安四縣四川之夔州府建始縣廣西之桂林府全州及興安縣越城嶺北境也豫州今河南之河南開封歸德南陽汝寧五府汝州直𨽻之大名府東明長垣二縣山東之兖州府定陶城武曹單四縣江南之鳯陽府潁亳二州潁上太和蒙城三縣湖廣之襄陽府襄陽光化宜城棗陽榖城五縣均州鄖陽府鄖保康二縣及鄖西縣東境德安府隨州北境也梁州今陜西之漢中府興安州及西安府商州雒南山陽鎮安商南四縣鞏昌府兩當鳯文成四縣徽階二州湖廣之鄖陽府房竹山竹溪三縣及鄖西縣西境四川之成都保寧順慶龍安馬湖五府潼川嘉定卭眉雅五州及叙州重慶夔州三府瀘州江北諸州縣松潘建昌二衛叠溪營黎大所天全六畨招討司是也雍州今陜西之臨洮平凉慶陽延安鳯翔五府西安府長安咸寧咸陽興平臨潼髙陵鄠藍田涇陽三原盩厔渭南富平醴泉朝邑郃陽澄城白水韓城華隂蒲城同官武功永夀三水淳化長武二十七縣同華耀乾邠五州鞏昌府隴西安定㑹寧通渭寧逺伏羌西和秦安清水漳禮十一縣秦州及榆林寧夏寧夏中靖逺岷州洮州甘州莊浪諸衛所其在化外者南至西傾積石西踰三危北抵沙漠皆是也山原附壺口今山西平陽府吉州西南七十里有壺口山黃河之水注其中如壺然梁岐案孔傳梁岐在雍州今陜西西安府韓城縣西北九十里之梁山鳯翔府岐山縣東北四十里之岐山也岐山一名天柱山山南為周原詩所謂周原膴膴也蔡𫝊疑雍州之山不當載於冀州指今山西汾州府永寧州東北之吕梁山一名骨脊山者為梁山汾州府孝義縣西之狐岐山一名薛頡山者為岐山然二山去河甚逺不得謂河水所經曽􅌈云壺口梁岐一役也其施功皆同時不可分言於二州故并言於冀得此可釋蔡氏之疑嶽陽太嶽一名霍太山今為中鎮在山西平陽府霍州東三十里山周二百餘里南接嶽陽趙城二縣北接靈石縣東接沁源縣界案嶽陽所該者廣蔡氏専指嶽陽一縣非是碣石按漢書地理志云大碣石山在右北平郡縣城縣西南武帝紀注文頴云碣石在遼西絫縣絫縣今罷入臨渝此石著海旁蓋驪城即今直𨽻永平府樂亭縣絫縣即今昌黎縣二縣壤地連接杳無碣石踪跡而海水蕩滅之說又荒誕不可信考肇域志云山東濟南府海豐縣有馬谷山即古碣石劉文偉亦以馬谷山在古九河之下合於禹貢入河入海之文斷為碣石無疑近世論碣石者惟此說庶幾近之明劉文偉云禹貢叙碣石有入河入海之文其在九河之末入海之口明矣今九河故道俱在德棣之間碣石不當復在他境况地𫝑北髙南下北平髙地河水奚由而逹耶馬谷山既在九河之下而又巍然獨出於海濵其為碣石無疑蒙蒙山在今山東青州府蒙隂縣南八里西南接兖州府費縣界延袤一百餘里嶧陽嶧陽一名葛嶧山在今江南淮安府邳州西南俗名距山以與沂水相距也岷岷山跨古雍梁二州自陜西鞏昌府岷州衛以西大山重谷谽谺起伏西南走蠻箐中直抵四川成都府之西境凡茂州之雪嶺灌縣之青城皆其支脉而導江之處則在今松潘衛北西畨界之浪架嶺漢書地理志所云岷山在湔底道西􅗲外是也嶓嶓冡有二一在陜西漢中府寧羌州北九十里東漢水所出即導漾之嶓冡一在鞏昌府秦州西南六十里西漢水所出二山南北相去三四百里而支脉隱然聯屬郡縣志所謂隴東之山皆嶓冡是也蔡蔡山宋葉少藴謂即周公山在今四川雅州東五里蒙蒙山在今雅州名山縣西五里接雅州及蘆山縣界西傾西傾山一名嵹臺山在今陜西鞏昌府洮州衛西畨界延袤千里外跨諸羌荆荆山在今陜西西安府富平縣西南十里下有荆渠即北條之荆終南終南山在今陜西西安府長安縣南五十里東至藍田縣西至鳯翔府郿縣綿亘八百餘里惇物惇物山漢書地理志右扶風縣武功注大一山古文以為終南垂山古文以為惇物皆在縣東武功今陜西鳯翔府郿縣考圖志不載是山胡渭禹貢錐指以為太一之北峯在縣東四十里者是也鳥鼠鳥鼠山在今陜西臨洮府渭源縣西二十里三危三危山在大河南今陜西岷州衛塞外古叠州西西畨界中雲南麗江府北河圖括地象云三危在鳥鼠西南與汶山相接黑水出其南鄭𤣥云南當岷山則在積石西南是也今雲南大理府雲龍州西有三崇山一名三危瀾滄江經其麓有黑水祠或以為即古三危也乎按黑水即今之瀾滄江若以三危在麗江府北似太逺雲龍州之說頗亦近理並存備考積石積石山在今河州北一百二十里水經注謂之唐述山括地志云山𫝑峭拔下臨黃河其西五十里有積石關唐置積石軍於此山海經云積石山在金地河門關西南境中漢之河關縣今之河州杜佑通典云禹施功自積石山達龍門龍門龍門山在今陜西西安府韓城縣東北五十里大河之西東與壺口隔水相望崑崙崑崙山在今西畨界有三山一名阿克坦齊禽一名巴爾布哈一名巴顔喀拉總名枯爾坤譯言崑崙也在積石之西河源所出按漢書地理志金城郡臨羌縣西北至塞外有西王母石室西有弱水崑崙山祠此蔡𫝊所據以為崑崙在臨羌者也然漢志言西有崑崙山祠非言山在縣界漢臨羌縣在今陜西西寧衛西崑崙山不啻若是之近通典云吐蕃自云崑崙山在國中西南河之所出唐書吐蕃𫝊云劉元鼎使還言自湟水入河處西南行二千三百里有紫山直大羊同國古所謂崑崙蕃曰悶摩黎山東距長安五十里河源其間元史附録河源云吐畨朵甘思東北有大雪山名亦耳麻不莫剌其山最髙譯言騰乞里塔即崑崙也按雪山今名爾托灰山在崑崙之東諸水所合諸源滙流經其下非即崑崙也元史誤發又按此崑崙山乃河水伏流發見之地非四大水源之崑崙也互詳黑水案下岍岍山漢書地理志名吳山在今陜西鳯翔府隴州南八十里雷首雷首山括地志云此山西起雷首東至吳坂長數百里隨地異名通典云雷首在河東縣今山西蒲州此山凡有八名歷山首陽山薄山襄山甘棗山中條山渠豬山獨頭山也互見前歷山下底柱底柱山在今河南河南府陜州東四十里大河中西北去山西平陽府平陸縣五十里析城析城山在今山西澤州陽城縣西南七十里王屋王屋山在今河南懷慶府濟源縣西北九十里接山西平陽府垣曲縣及澤州陽城縣界山有三重其狀如屋太行太行山延袤千餘里起於河南懷慶府濟源縣迤西東北跨山西河南直𨽻界朱圉朱圉山在今陜西鞏昌府伏羌縣西南三十里熊耳熊耳山在今河南河南府盧氏縣西南七十里接陜西西安府商州晉上洛縣界熊耳雖有東西異名其實一山故郭璞云在上洛班固云在盧氏蔡𫝊