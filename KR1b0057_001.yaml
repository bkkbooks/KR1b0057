非是汶汶水出今山東濟南府萊蕪縣其源非一合流於泰安州之靜安鎮謂之大汶又有小汶出新泰縣宫山之下至徂徠山南入大汶水經注有牟汶北汶柴汶元和志又有嬴汶禹貢錐指云汶水有五北汶嬴汶柴汶牟汶其一則經流也嬴汶在今萊蕪縣南三十里源出新泰縣宫山之隂流合牟汶牟汶在萊蕪縣南門外西流至泰安州東入汶北汶即泮水源出泰山分水嶺泰安州志謂之塹汶柴汶在泰安州東三十五里俗名司馬河又有水出萊蕪縣寨子村流合牟汶者近志指為浯汶據漢志琅邪靈門縣有髙朵山浯水所出東北入濰說文云水出靈門山世謂之浯汶在今莒州界與萊蕪無涉志誤汶水舊由安民亭合濟水東北入海自明永樂九年於東平州東六十里築戴村壩盡遏汶水出南旺南北分流南流逹於濟寧州㑹沂泗諸水入淮者十之四北流逹於臨清州㑹漳衛諸水入海者十之六矣沂沂水出今山東青州府沂水縣西北一百七十里雕崖山鄭康成云沂水出沂山或云臨樂山酈道元云沂水出艾山禹貢錐指謂雕崖臨樂艾山皆沂山艾阜之異名也接蒙隂縣界南流至江南淮安府宿遷縣北滙為駱馬湖又南入運河泗泗水出今山東兖州府泗水縣東五十里陪尾山四源並發故名西南流至兖州府城東金口壩分為二𣲖一越壩西南流至濟寧州界為泗河又西南至魯橋入運河一從壩上西流至兖州府城西為府河又西南至濟寧州東合洸水又西南至天井閘入運河按史記河渠書叙禹功畢乃云自是之後滎陽下引河東南為鴻溝以通宋鄭陳蔡曹衛與濟汝淮泗㑹汳水為鴻溝分流禹時所未有許慎所云乃周漢以後水道不可為禹時淮泗入河之證也蓋徐州貢道自淮入泗自泗入泲入漯以逹河當在菏澤以東若菏澤以西泲水屢見屢伏與河無相通之理泗水安能逹於河耶蔡氏所謂泗之上源自泲可以通河者亦未明晰彭蠡彭蠡湖在今江西南昌府城東北一百五十里饒州府城西四十里南康府城東五里九江府城東南九十里上承章貢諸水與江水相吞吐周回四百五十里亦曰鄱陽湖者以中有鄱陽山而名俗又稱在都昌縣者為東鄱湖在南昌縣者為西鄱湖三江按三江孔安國班固鄭康成韋昭桑欽郭璞顧夷諸說不一惟鄭康成曰左合漢為北江右合彭蠡為南江岷江居其中則為中江故書稱東為中江者明岷江至彭蠡與南北合始得稱中也融洽前後經文確不可易宋蘇軾實宗其說蔡𫝊専主庾仲𥘉吳都賦注取松江婁江東江為三江力排蘇說且曰大江合漢與彭蠡之後又十餘里而入海不復可指為三不知三江云者因上流有中江北江南江而言之非截然指為三也蔡𫝊又云禹貢無施勞者雖大亦略揚州大江無俟濬治故在不書不知禹貢所紀皆成功而施功即在其中當洪水泛濫之後大江自彭蠡以東至入海處其間豈無泥沙壅塞謂之無施勞可乎况管子荀子淮南子皆云禹疏三江可證也又按經文叙漢水入江之後又必叙其東滙澤為彭蠡東為北江入於海者江漢𫝑均力敵漢水雖與江水㑹合為一亦必窮其下流以至入海也鄭樵衍文之說朱子嘗從之未敢以為定論漢水入江而滙為彭蠡則漢亦為江江亦為漢非謂漢水入江之後七百餘里獨橫截而南入於畨陽也畨陽合數州之流豬而為澤雖無仰於江漢而江漢東流乘𫝑而入朱子固云地𫝑北髙南下湖水為江水所遏因郤而為豬安見江漢二水不可逆流而入彭蠡耶彭蠡在南經文不云南滙而云東滙者就江漢大𫝑而言與下文東為北江東字並同至蔡氏泥於東滙北滙之文欲以巢湖代彭蠡且謂官屬之往者未敢深入誤比彭蠡於巢湖則詞更支離矣震澤即太湖介於江南浙江之間今江南蘇州府之吳吳江二縣常州府之武進無錫宜興三縣浙江湖州府之烏程長興二縣皆其所分𨽻也九江即洞庭湖在今湖廣嶽州府巴陵縣西南北接華容安鄉二縣西南接常德府龍陽縣東南接長沙府湘隂縣界為湖南衆水之滙按漢書地理志廬江郡尋陽縣禹貢九江在南皆東合為大江蔡𫝊云九江尋陽乃禹貢揚州之域不得以荆州之水當之且導江經文過九江至於東陵東陵即今巴陵嶽州府治九江在巴陵之上其非尋陽可知山海經於洞庭之山云澧沅瀟湘在九江之間水經云九江在長沙下雋縣今武昌府通城崇陽二縣地西北至宋曽彥和以沅沅水出今貴州黎平府生苗界俗名清水江東北入湖廣境合辰酉等水注洞庭湖漸出今湖廣常德府武陵縣東入沅無亦作潕出今湖廣辰州府沅陵縣入沅辰出今貴州銅仁府東北至湖廣辰州府入沅叙一名渠江出今湖廣靖州西北入沅酉出今沅陵縣東入沅湘出今廣西桂林府興安縣東北入洞庭湖資出今湖廣寶慶府武岡州東北入湘澧詳復導江水皆合洞庭中東入於江是為九江蔡氏遵之朱子考定九江去無澧二水而易以瀟一名營水出今湖廣永州府寧逺縣北注湘水蒸出今寶慶府邵陽縣界東注於湘大抵通儒皆主洞庭之說也沱按荆川之沱有二說漢書地理志云南郡枝江縣今屬湖廣荆州府江沱出而東入江顔師古曰沱即江别出者也水經江水東徑上明城北注云其地夷敞北據大江江汜枝分東入大江縣治洲上故以枝江為稱是古枝江縣有沱水也今不可考又孔頴逹正義引鄭注云華容漢華容縣今荆州府監利石首二縣地非今之嶽州府華容縣也有夏水首出江尾入沔此所謂沱也夏水自今荆州府江陵縣東南首受江水曰中夏口經監利縣沔陽州界入漢水以其冬竭夏流故名夏水其在梁州者則今四川成都府郫縣沱江是江在縣北六里一名郫江至瀘州入大江其上流為成都府灌縣蔡𫝊所謂永康軍導江縣是也潛潜水一在今安陸府潜江縣東由蘆洑腦分流繞城東南一支通順河入沔陽州境今淤一支南流至拖船埠入漢水此荆州之潜也禹貢錐指曰韻㑹潜水伏流也荆州之潜雖不如龍門石穴之竒亦必漢水伏流從平地湧出故謂之潜今漢水之分流者名蘆洑宜取伏流之意以為古潜水庶幾得之蓋禹時本自伏流涌出復入於漢及乎後世通渠漢川雲夢之際則開通上源以資舟楫之利禹迹遂不可知耳一在今四川保寧府廣元縣亦名龍門水自朝天驛北穿穴而出入嘉陵江此梁州之潜也郭璞爾雅音義云有水從漢中沔陽縣南流至梓潼漢夀入大穴中通峒山下西南潜出一名沔水舊俗云即禹貢潜也又四川順慶府渠縣東有潜水梁縣蔡𫝊所謂渠州流江縣也孔氏𫝊云荆梁二州各有沱潜但地𫝑西髙東下雖於梁州合流還從荆州合出耳按梁州之沱至瀘州入江而梁州之潜亦無從荆州分出之理蓋荆州别有沱潜也孔說非是伊伊水出今河南河南府盧氏縣熊耳山縣志謂伊水出悶頓嶺之陽者古熊耳盤基甚廣悶頓亦熊耳也至偃師縣南入洛洛洛水出今陜西西安府雒南縣冡嶺山至河南府鞏縣東北入河瀍瀍水出今河南府洛陽縣西北榖城山至縣東入洛澗澗水出今河南府澠池縣東北白石山至洛陽縣西南入洛滎波即滎澤在今河南開封府滎陽縣南三里古城村按孔安國𫝊云滎澤波水已成遏豬正義曰鄭云今塞為平地滎陽民猶謂其處為榮澤在其縣東蓋濟水伏流地中絶河而南溢為巨澤禹貢錐指云按馬鄭王本波並作播伏生今文亦然孔安國解作一水非二水以為二水自顔師古始宋林之竒本之引周職方豫州其川滎雒其浸波溠爾雅水自洛出為波别滎波為二水蔡氏因之然按圖究義以榮波為二水終無是處傅氏寅曰上文言導洛此則専主導濟言不當又泛言洛之支水職方所記山川非治水次第不必泥也山海經婁涿之山波水出於其隂北流注於榖水今本作陂郭璞云世謂之百谷水非屬波水證一惟酈注引作波然亦出於山不出於洛非屬波水證二水經洛水又東門水出焉注云爾雅所謂洛别為波也惟此堪引然余考門水下流為鴻關水今謂之洪門堰在商州洛南縣東北至靈寶縣而入河何曽見水豬為澤乎非屬波水證三且職方豫州之波出魯山縣鄭注謂即榮播固非而洛南之波水則與滎澤相距五六百里中隔大山豈可總撮而言之曰滎波既豬乎其說極詳引之以證林氏之失黑水按黑水之辨諸家紛如謹考地圖禹貢之黑水有三正不必强合水經注所謂黑水出張掖雞山今甘州至於燉煌今廢沙州此雍州之黑水也漢書地理志犍為郡縣南廣注云汾關山符黑水所出南廣今廣符縣北至𤏡道入江今叙州府唐樊綽亦以麗江為古黑水云羅些城北有三危山羅些城在今麗江府北境其水從山南行上流出土畨界薛季宣謂瀘水為黑水今打冲河引酈道元說黑水亦曰瀘水即若水出姚州徼外土畨界中山海經黑水之間有若水是也以麗江之說為非不知打冲河至大姚縣即合金沙江㑹流入岷江薛氏之說原與漢志相合此梁州之黑水也宋程大昌以瀾滄江為黑水李元陽黑水辨亦云隴蜀無入南海之水唯滇之瀾滄足以當之而元史載勸農官張立道使交址並黑水以至其國吳任臣山海經注亦以瀾滄為古黑水此導川之黑水也蓋雍州之黑水其源在黃河之北梁州及導川之黑水其源皆在黃河之南有截然不相紊者第以張掖燉煌尚在內地可以尋源而求而推其委而不得遂托為越河伏流之說夫崑崙為地軸其山根連延起頓包河內接秦隴直逹長安為南山黑水自燉煌而南縱可越大河之伏流其不能越河以南之南山也明矣若狃於雍州三危既宅之說謂三危黑水並在雍州域內不知導川之三危在大河之南非即竄三苗之三危辨詳舜典三危下而雍州之黑水必非導川之黑水也又明矣然主瀘水麗江瀾滄之說者亦皆以意度未能確指水之分合不知瀘水麗江源異而流同麗江瀾滄源同而流異分合言之梁州之黑水有兩支而與導川之黑水實出一源也而古未有及之者蓋以二水僻在畨界隔蔽南山阻奧從古未通中國即魏之法顯唐之𤣥奘元世祖之南征丘處機之西逰皆繞出崑崙以外歷西域諸國至於滇南既未嘗經其地但從入中國之支流以古今分域配之料約為某水某水而已今四海大一統皇上恩威所届靡不霑被震懾郵𫝊所至迎將恐後特命使臣逺歷西畨究原討委寫圖以志支𣲖經絡瞭如指掌諸家浮說有所折𠂻矣謹將黑水同異分注於左雍州黑水出陜西甘肅塞外南流至河州入積石河今俗名大通河是也按括地志云黑水出伊川伊吾縣北東南流至鄯州又東南至河州入黃河今黑水上源為流沙壅塞已無遺跡可考其下流為大通河在瓜州之南歷西寧衛東南至河州入河西寧即唐之鄯州則括地志之說與今圖合又按河至積石北則大通河入之南則大夏河注之二水入河之口南北相值後人或遂指大夏為黑水地河而南之跡不知大夏雖在黃河之南實仍在南山之北且其源自南而北與山南入海之水絶不相通梁州黑水即今雲南之金沙江其源發於西畨諾莫渾五巴什山分支之東曰阿克逹毋必拉南流至塔城關入雲南麗江府境亦曰麗水按麗水即金沙江入岷江不入南海唐樊綽云麗水入南海非東南流至姚安府大姚縣之左却鄉即苴却營北打冲河自鹽井衛來㑹之打冲河出自西畨界在崑崙東南百里二源同發名查褚必拉蒙古謂之七察兒哈那平地水泉數十泓沮洳沸散若列星滙而南流有支河十二通左右流入之至占對安撫司入四川界南流東折繞鹽井營之東北入南至烏喇猓果入金沙江又東入四川境徑㑹川營南又東至東川府西折而東北流徑烏蒙府西北馬湖府南又東徑叙州府南入岷導川黑水即今雲南之瀾滄江其源發於西畨諾莫渾五巴什山分支之