德府寧陵縣西十里有葛城漢書地理志陳留郡寧陵縣注云故葛伯國今葛鄉是湯誥亳按漢志河南郡偃師縣注云尸鄉殷湯所都又山陽郡薄縣注云湯所都皇甫謐曰孟子稱湯居亳與葛為鄰葛伯不祀湯使亳衆為之耕葛即今梁國寧陵之葛鄉也若湯居偃師去寧陵八百餘里豈當使民為之耕乎亳今梁國榖熟縣後漢改山陽郡亳縣為榖熟屬梁國亳與薄義同字異也皇甫謐主榖熟為湯都良是不知偃師亦湯都也張守節文記正義曰湯即位都南亳元和志云宋州榖熟縣殷之所都謂之南亳後徙西亳通典云河南偃師縣亦古亳邑商有三亳成湯居西亳此即一也至盤庚又自河北徙理於此蓋湯未伐桀居南亳後自南亳遷西亳與葛伯為鄰乃居南亳時事皇甫謐據此以獻疑固矣榖熟故城在今河南歸德府商邱縣東南四十里尸鄉在今開封府偃師縣四十里伊訓鳴條鳴條岡在今山西平陽府安邑縣北三十里接夏縣界括地志云髙涯源在蒲州安邑縣北南坂口即古鳴條岡是也太甲上桐宫按桐宫湯墓所在元和志云殷湯陵在河中府寶鼎縣北四十三里即今山西平陽府滎河縣也滎河縣志云殷湯陵在百祥村西元時淪入汾河以石柩遷葬明洪武初建陵寢於其東而江南鳯陽府亳州北相𫝊有湯陵陵東有桐宫當屬附㑹盤庚上五邦五邦亳囂相耿殷也亳見湯誥囂史記作隞並音敖字水經注云敖山上有城即殷仲丁之所遷秦置倉於其中亦曰敖倉城敖山在今河南開封府滎澤縣西北相亦名故殷城括地志云故殷城在相州內黃縣今屬直𨽻大名府東南十三里即河亶甲所築都之是也耿城在今山西平陽府吉州南隋置耿州於此以祖乙遷耿為名史記索隱云祖乙遷於邢邢音耿近代本亦作耿今河東皮氏縣有耿鄉蔡𫝊以祖乙兩遷分耿邢為二非也殷即西亳亦詳見湯誥說命上傅巖傅巖在今山西平陽府平陸縣東北二十五里一名隱賢社水經注云沙澗水出虞山東南徑傅巖歷傅說隱室前俗名之為聖人窟孔安國𫝊傅說隱於虞虢之間即此處也西伯戡黎黎黎國今山西潞安府黎城平順二縣地括地志云故黎城黎侯國也在潞州黎城縣東北十八里尚書云西伯戡黎是也微子微孔安國𫝊微圻內國名寰宇記云微子城在潞東北今山西潞安府潞城縣東北十五里有微子鎮即故城也周書周史記正義曰太王所居周原因號曰周文王因之有岐城亦名周城在今陜西鳯翔府岐山縣牧誓牧牧一作坶孔𫝊云紂近郊三十里地名牧括地志云今衛州城即殷牧野之地周武王伐紂築也水經注云雹水東南歷坶野自朝歌以南南暨清水土地平衍據臯跨澤悉坶野矣按紂都妹土在朝歌北隋置衛縣於此唐武德時為衛州治即今之淇縣也牧野當在今淇縣南迤邐以至汲縣故九域志謂汲城亦牧野之地也庸杜預云今上庸縣上庸今湖廣鄖陽府竹山縣是蜀正義云大劉以蜀是蜀郡今四川成都府是羌正義云蜀都分為三羌其在西故云西蜀蘇氏云先零枹罕之屬當在今陜西甘肅以西南接蜀漢塞外也髳微正義云孔𫝊髳微在巴蜀者巴在蜀之東偏漢之巴郡所治江州縣也江州縣今巴縣北屬四川重慶府盧古盧戎國今湖廣襄陽府南漳縣東北中盧故城是文十六年左𫝊楚伐唐自廬以往杜預云楚廬邑今中廬縣水經注云沔水過中廬縣東縣即春秋盧戎之國也彭正義云在東蜀之西北蘇氏曰屬武陽縣有彭亡武陽今四川眉州州北廢彭山縣有彭亡城是其地也濮按左𫝊文十六年庸人麋人率百濮伐楚疏孔安國云庸濮在江漢之南是濮為西南夷也釋例曰建寧郡南有濮夷無君長各以邑落自聚故稱百濮建寧故城在今湖廣荆州府石首縣其地要在石首之南也武成周蔡𫝊云周鎬京也鎬京在今陜西西安府長安縣南三十里三輔决録云鎬在豐水東豐在豐水西相去二十五里自漢武帝穿昆明池於此鎬京遺址淪陷焉豐豐邑在今陜西西安府鄠縣東史記文王伐崇侯虎而作豐邑是也桃林今陜西潼關衛東南有牧牛山按河南閿鄉縣界亦名夸父山山海經夸父山北有林焉名曰桃林水經注云湖水出桃林塞之夸父山武王伐紂天下既定散牛桃林即此處也比干墓在今河南衛輝府汲縣北十里鹿臺亦名南單臺在今衛輝府淇縣括地志云鹿臺在衛縣西南二十二里是也巨橋在今直𨽻廣平府曲周縣東北通典云洺州曲周縣紂巨橋倉在此今河南衛輝府淇縣東北十五里亦有巨橋非也洪範箕蔡𫝊國名姓纂云商之圻內僖三十三年晉敗狄於箕者杜預云太原陽邑有箕城在今山西遼州榆杜縣東南三十里金縢管管國今河南開封府鄭州括地志云鄭州管城縣外城古管國城也周武王弟叔所封微子之命東夏蔡𫝊云宋亳在東故曰東夏今河南歸德府商邱縣宋微子所封以為湯後也康誥東洛國洛有王城有成周王城在今河南河南府洛陽縣西五里括地志云故王城一名河南城本郟鄏周公新築在洛州河南縣北九里苑內東北隅自平王以下十二王皆都此至敬王乃遷都成周至赧王又居王城也成周在今洛陽縣東三十里洛誥所謂我卜瀍水東亦惟洛食者也又名下都周遷殷頑民於此史記正義云東周古洛陽城也括地志云洛陽故城在洛州洛陽縣東北二十六里周公所築即成周城也酒誥妹邦今河南衛輝府淇縣北有妹鄉孔𫝊云妹紂所都朝歌以北是也洛誥黎水蘇氏曰黎水今黎陽也續文獻通考云衛河淇水合流至黎陽故城為黎水亦曰濬水黎陽故城在今直𨽻大名府濬縣東北多士奄奄國在今山東兖州府曲阜縣境括地志云兖州曲阜縣奄里即奄國之北也君奭虢漢書地理志有三虢北虢在大陽今山西平陽府平陸縣東北有大陽故城東虢在滎陽今河南開封府滎澤縣西虢在雍州韋昭云西虢虢叔之後在鎬京畿內今陜西鳯翔府寶雞縣有虢縣故城蔡仲之命蔡蔡國今河南汝寧府上蔡縣縣西南十里有故蔡城杜預云武王封叔度於汝南上蔡至平侯徙新蔡昭侯徙居九江下蔡也霍霍國今山西平陽府霍州州西南十六里有霍城地理通釋云霍姬姓文王子叔處所封立政三亳按蔡𫝊云三亳蒙為北亳榖熟為南亳偃師為西亳今河南歸德府商邱縣北四十里有大蒙城水經注云汲水東經大蒙城北疑即蒙亳也所謂景亳為此亳矣南亳西亳詳見湯誥君陳東郊東郊即下都詳見康誥顧命芮孔𫝊云周同姓圻內之國杜預云馮翊臨晉縣芮鄉今陜西西安府朝邑縣有南芮鄉北芮鄉古芮伯國也彤按胡三省通鑑注彤伯之國當在鄭縣界鄭縣今陜西西安府華州州西南有彤城畢杜注云在長安縣西北長安今屬陜西西安府衛今河南衛輝府淇縣毛路史云毛伯國上邽藉水旁有毛泉上邽今陜西鞏昌府秦州地按毛泉見水經注亦未言即毛伯之國路史不知何據今毛地未知確在何所姑存其說齊史記武王封師尚父於齊都營丘正義云營丘在青州臨淄北百步外城中今山東青州府臨淄縣西北三里有營邱城是也費誓費孔𫝊云費魯東郊地名蘇氏云費在東海郡後為季氏邑季氏之費邑今山東兖州府費縣西北二十里有故城是孔安國謂魯東郊地則是今曲阜縣境未詳所在徐戎按孔安國𫝊徐戎徐州之戎括地志云大徐城在泗川徐城縣北三十里古之徐國也括地志又以徐國即淮夷非是徐城縣今廢為江南鳯陽府泗州魯史記武王封弟周公旦於曲阜曰魯括地志云兖州曲阜縣外城即周公旦子伯禽所築古魯城也曲阜縣今屬山東兖州府秦誓秦周孝王封非子於秦因為國號今陜西鞏昌府秦尚書地理今釋
