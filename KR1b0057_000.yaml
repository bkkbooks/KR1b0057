body:
  text: 尚書地理今釋書類提要臣等謹案尚書地理今釋一卷國朝蔣廷錫撰廷錫字揚孫常熟人康熙癸未進士官至大學士諡文肅是編乃其官內閣學士時所作首題聖訓蓋儤直內廷之日仰承指授敬繕成帙者也其中訂定諸儒之說者如堯典宅嵎夷則據後漢書定為朝鮮正薛季宣于欽之誤宅西則據黃度尚書說不限以一地正徐廣史記注之誤釐降媯汭則據孔安國傳陸德明釋文之說正水經注媯汭二水之誤舜典恆山則據渾源曲陽之道里正漢志止曲陽之誤夾右碣石則據顧炎武肇域志所載劉文偉說正漢志右北平之誤滎波既瀦則據傅寅之說正孔𫝊滎波分二水之誤又訂定蔡沈集𫝊之說者如禹貢治梁及岐則據曽􅌈之說辨其非吕梁狐岐九河既道則據經典釋文辨簡潔非一河灉沮既同則據元和郡縣志元豐九域志辨此沮水非汳沮浮於濟漯則據漢書地理志陳師凱書𫝊旁通辨其不知漯水所在濰淄既道則據水經注辨淄水不東入濟浮於淮泗則據史記河渠書辨禹時泗水上源不自泲通河三江既入則據鄭康成之說辨其誤從庾闡吳都賦注和夷底績則據水經注時瀾書說辨嚴道以西無夷道盤庚于今五遷則據史記索隱辨邢即音耿祖乙並未兩遷以及三危有二嶓冢亦有二熊耳有二而實一雍梁二水兼得岷山荆梁二州各有沱潛黑水有三漢水有二南亳西亳皆湯所都均考證精核足以證往古之訛釋後儒之惑至於崑崙河源之說非惟訂漢儒之􅍝並正元史之非是則恭逢聖代混一輿圖得以考見其實據尤非前代經師輾轉耳食者比矣欽定書經𫝊說已備採其文此蓋其先出别行之本敬著於録俾天下萬世知聖學髙深度越千古仰觀俯察協契庖犧一時珥筆之臣鞠􅎽螭坳側聆聖訓得餘緒之萬一已能綜括古今為說經家所未曽有也乾隆四十五年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:cf02217279141250320a7277e7732709147e6bbc780fd24f47298f4f8205a2f1
